function q(text,answers,explanation){return{text,answers,explanation}}function a(text,correct,feedback=''){return{text,correct:!!correct,feedback}}
const KEYS=Object.keys(STATIONS), STORE='spiceGuardiansMVP_v2';let state=load();const app=document.getElementById('app');
function load(){try{return JSON.parse(localStorage.getItem(STORE))||null}catch(e){return null}}function save(){localStorage.setItem(STORE,JSON.stringify(state))}function reset(){localStorage.removeItem(STORE);state=null;renderHome()}function shuffle(arr){return arr.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1])}function param(){return new URLSearchParams(location.search).get('station')}function elapsed(){return state?.start?Math.floor((Date.now()-state.start)/1000):0}function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}function nextKey(){return state.route.find(k=>!state.done.includes(k))}function stars(){return state?.stars||0}
function init(name){state={name:name||'קבוצה',route:shuffle(KEYS),done:[],stars:0,bonuses:0,bonusTimes:shuffle([77,28,42]),usedBonus:[],start:Date.now(),current:null,qIndex:0,answered:[]};save();renderDashboard()}
function shell(content){app.innerHTML=`<section class="screen">${content}</section>`}
function header(title=''){return `<div class="topbar"><span class="pill">${fmt(elapsed())}</span><span class="pill">${title}</span></div>`}setInterval(()=>{if(state&&document.querySelector('.topbar .pill')){document.querySelector('.topbar .pill').textContent=fmt(elapsed())}},1000)
function creatureGrid(){return `<div class="creatures">${KEYS.map(k=>{const s=STATIONS[k],ok=state?.done?.includes(k);return `<div class="creature ${ok?'':'locked'}"><div class="emoji">${s.emoji}</div><b>${s.creature}</b></div>`}).join('')}</div>`}
function renderHome(){shell(`<h1 class="title">שומרי התבלין</h1><div class="subtitle">היצורים מחכים...</div>${creatureGrid()}<button onclick="renderStory()">התחילו במסע</button><p class="footer">גרסת MVP רזה</p>`)}
function renderStory(){shell(`<div class="story"><p>אוי לא...</p><p>יצורי הגן נעלמו.</p><p>בלי יצורי הגן אי אפשר להשלים את התבלין הסודי.</p><p>ובלי התבלין הסודי...</p><p><b>אי אפשר להגיש את ארוחת הצהריים.</b></p></div><button onclick="renderRules()">המשך</button>`)}
function renderRules(){shell(`<h2 class="stationHeader">חוקי המשחק</h2><ul class="rules"><li>הסתובבו בגן.</li><li>מצאו תחנה.</li><li>סרקו את ה־QR.</li><li>ענו על השאלות ותתפסו יצורים.</li><li>טעיתם? תוכלו לנסות שוב.</li><li>אספו את כל היצורים לפני ארוחת הצהריים.</li><li>אולי גם תזכו בבונוס סודי...</li></ul><button onclick="renderName()">הבנתי</button>`)}
function renderName(){shell(`<h2 class="stationHeader">שם קבוצה</h2><p class="subtitle">אפשר לשחק לבד, בזוג או בקבוצה.</p><input id="groupName" placeholder="לדוגמה: שומרי הצהריים"><button onclick="init(document.getElementById('groupName').value.trim())">צאו לדרך</button>`)}
function renderDashboard(){if(!state)return renderHome(); if(state.done.length===KEYS.length)return renderEnd(); const next=nextKey(), s=STATIONS[next]; shell(`${header('המסע')}<h2 class="stationHeader">מפת ההתקדמות</h2><div class="pill" style="text-align:center">יצורים: ${state.done.length}/6 · כוכבים: ${stars()}</div>${creatureGrid()}<div class="hint"><b>הרמז הבא:</b><br>${s.hint}</div><p class="small" style="text-align:center">סרקו את קוד ה־QR בתחנה שמצאתם.</p><button class="secondary" onclick="reset()">איפוס משחק</button>`)}
function handleStation(k){if(!state)return renderHome(); if(!STATIONS[k])return shell(`${header('תחנה')}<h2>תחנה לא מוכרת</h2><button onclick="renderDashboard()">חזרה</button>`); if(state.done.includes(k)){const s=STATIONS[k]; return shell(`${header(s.name)}<div class="bigemoji">${s.emoji}</div><h2 class="stationHeader">${s.creature} כבר מטייל איתכם.</h2><p class="subtitle">המשיכו למצוא את חבריו.</p><button onclick="renderDashboard()">חזרה למסע</button>`)} const next=nextKey(); if(k!==next){return shell(`${header('מקום מסתור')}<h2 class="stationHeader">נראה שהגעתם למקום של שומר אחר...</h2><p class="subtitle">חזרו לרמז האחרון וחפשו את מקום המסתור הבא.</p><button onclick="renderDashboard()">חזרה למסע</button>`)} state.current=k;state.qIndex=0;state.answered=[];save();renderEncounter(k)}
function renderEncounter(k){const s=STATIONS[k];shell(`${header(s.name)}<div class="bigemoji">${s.emoji}</div><h2 class="stationHeader">מצאתם את מקום המסתור של ${s.creature}!</h2><p class="role">${s.role}</p><p class="subtitle">אפשר לחכות בסבלנות. הרבה סבלנות... או לענות על השאלות ולאסוף אותו.</p><button onclick="renderQuiz()">לענות על השאלות</button><button class="secondary" onclick="waitJoke()">נחכה בסבלנות...</button>`)}
function waitJoke(){const s=STATIONS[state.current];shell(`${header(s.name)}<div class="story"><p>...</p><p>...</p><p>נראה ש${s.creature} לא יוצא לבד.</p><p>תצטרכו לענות על השאלות.</p></div><button onclick="renderQuiz()">קדימה לשאלות</button>`)}
function renderQuiz(feedback='',correctNote=''){const k=state.current,s=STATIONS[k],qu=s.questions[state.qIndex]; const pct=Math.round((state.qIndex/s.questions.length)*100); shell(`${header(s.name)}<div class="stationHeader">${s.emoji} ${s.creature}</div><div class="progress"><i style="width:${pct}%"></i></div><div class="question">${qu.text}</div>${qu.answers.map((ans,i)=>`<button class="answer" onclick="answer(${i})">${'אבגדה'[i]}. ${ans.text}</button>`).join('')}${feedback?`<div class="feedback">${feedback}<br><br>נסו שוב.</div>`:''}${correctNote?`<div class="okbox">${correctNote}</div>`:''}`)}
function answer(i){const k=state.current,s=STATIONS[k],qu=s.questions[state.qIndex],ans=qu.answers[i]; if(ans.correct){state.qIndex++;state.stars++;maybeBonus();save(); if(state.qIndex>=s.questions.length)return capture(); renderQuiz('',`נכון. ${qu.explanation||''}`)} else {renderQuiz(ans.feedback||'עוד לא השתכנע.', '')}}
function maybeBonus(){const e=elapsed(); const hit=state.bonusTimes.find(t=>!state.usedBonus.includes(t)&&e===t); if(hit){state.usedBonus.push(hit);state.bonuses++;state.stars++;state.pendingBonus=true}}
function capture(){const k=state.current,s=STATIONS[k]; if(!state.done.includes(k))state.done.push(k);state.current=null;save(); let bonus=''; if(state.pendingBonus){state.pendingBonus=false;save();bonus=`<div class="okbox">⭐ בונוס סודי!<br>הגעתם בדיוק לאחד מזמני התבלין הסודיים.<br>אל תשאלו איך. השומרים לא מגלים.</div>`} shell(`${header(s.name)}<div class="bigemoji">${s.emoji}</div><h2 class="stationHeader">${s.creature} הצטרף אליכם!</h2><p class="subtitle">תרומה לתבלין: ${s.contribution}</p>${bonus}<button onclick="renderDashboard()">המשך במסע</button>`)}
function renderEnd(){shell(`${header('סיום')}<h1 class="title">כל הכבוד!</h1>${creatureGrid()}<div class="story"><p>הצלחתם לאסוף את כל שומרי התבלין.</p><p>התבלין הסודי הושלם.</p><p><b>אפשר להגיש את ארוחת הצהריים.</b></p></div><div class="hint"><b>${state.name}</b><br>זמן: ${fmt(elapsed())}<br>כוכבים: ${state.stars}<br>בונוסים: ${state.bonuses}</div><p class="subtitle">צלמו מסך ושלחו בקבוצה.</p><button class="secondary" onclick="reset()">משחק חדש</button><p class="footer">תודה שביקרתם בגן התנ״כי ביד השמונה.</p>`)}
window.answer=answer;window.renderStory=renderStory;window.renderRules=renderRules;window.renderName=renderName;window.renderDashboard=renderDashboard;window.reset=reset;window.init=init;window.renderQuiz=renderQuiz;window.waitJoke=waitJoke;
(function boot(){const st=param(); if(!state){renderHome();return} if(st){handleStation(st)}else{renderDashboard()}})();
</script></body></html>
